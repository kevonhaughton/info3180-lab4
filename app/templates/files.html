{% extends "base.html" %}

{% block main %}
<h2 class="mt-4">Uploaded Images</h2>

{% if images %}
<div class="image-grid">
    {% for image in images %}
    <div class="image-item">
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
        <p>{{ image }}</p>
    </div>
    {% endfor %}
</div>
{% else %}
<p>No images have been uploaded yet.</p>
{% endif %}
{% endblock %}
